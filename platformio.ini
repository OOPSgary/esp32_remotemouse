; ESP32 RemoteMouse - PlatformIO configuration
;
; Two environments:
;   esp32   – Original ESP32 (WROOM/WROVER): BT Classic + BLE only
;   esp32s3 – ESP32-S3: BT Classic + BLE + USB Host (hub support built-in)
;
; Use ESP32-S3 when you need to connect keyboard + mouse through a USB hub
; or docking station.

[env:esp32]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
build_flags =
    -DCONFIG_BT_ENABLED=1
    -DCONFIG_BLUEDROID_ENABLED=1
    -DCONFIG_BT_BLE_ENABLED=1
    -DCONFIG_BT_BLE_42_FEATURES_SUPPORTED=1
    -DCONFIG_GATTC_ENABLE=1
    -DCONFIG_BT_HID_HOST_ENABLED=1
    -DCONFIG_LWIP_SO_RCVBUF=1

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
build_flags =
    -DCONFIG_BT_ENABLED=1
    -DCONFIG_BLUEDROID_ENABLED=1
    -DCONFIG_BT_BLE_ENABLED=1
    -DCONFIG_BT_BLE_42_FEATURES_SUPPORTED=1
    -DCONFIG_GATTC_ENABLE=1
    -DCONFIG_BT_HID_HOST_ENABLED=1
    -DCONFIG_LWIP_SO_RCVBUF=1
