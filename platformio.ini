; ESP32 RemoteMouse - PlatformIO configuration
; Supports classic ESP32 (WROOM/WROVER) with ESP-IDF framework
; BT Classic + BLE dual-mode HID Host → Wi-Fi UDP forwarder

[env:esp32]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
build_flags =
    -DCONFIG_BT_ENABLED=1
    -DCONFIG_BLUEDROID_ENABLED=1
    -DCONFIG_BT_BLE_ENABLED=1
    -DCONFIG_BT_BLE_42_FEATURES_SUPPORTED=1
    -DCONFIG_GATTC_ENABLE=1
    -DCONFIG_BT_HID_HOST_ENABLED=1
    -DCONFIG_LWIP_SO_RCVBUF=1
